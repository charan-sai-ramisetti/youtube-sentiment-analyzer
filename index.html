<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online Feedback Analysis</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f6f9;
font-family:Arial, Helvetica, sans-serif;
}

.title{
text-align:center;
font-weight:700;
margin-top:30px;
margin-bottom:30px;
}

.card{
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.video-info{
display:none;
}

.word-chip{
display:inline-block;
background:#e9ecef;
padding:6px 10px;
border-radius:8px;
margin:4px;
font-size:14px;
}

.comment-box{
border-bottom:1px solid #eee;
padding:8px 0;
}

</style>

</head>

<body>

<div class="container">

<h2 class="title">Online Feedback Analysis</h2>

<div class="row justify-content-center mb-4">

<div class="col-lg-8 col-md-10">

<div class="input-group">

<input
type="text"
id="url"
class="form-control"
placeholder="Paste YouTube Video URL here">

<button class="btn btn-primary" onclick="analyze()">
Analyze
</button>

</div>

<p id="status" class="text-center mt-2"></p>

</div>

</div>


<div id="videoInfo" class="video-info mb-4">

<div class="card p-3">

<div class="d-flex flex-column flex-md-row align-items-center">

<img id="thumbnail" width="200" class="rounded me-md-3 mb-3 mb-md-0">

<div>

<h5 id="videoTitle"></h5>
<p id="videoChannel" class="mb-1"></p>
<p id="videoViews" class="text-muted"></p>
<p id="commentCount"></p>

</div>

</div>

</div>

</div>


<div class="row g-4">

<div class="col-lg-6 col-md-12">

<div class="card p-3 h-100">

<h5>Language Distribution</h5>

<div id="languages"></div>

</div>

</div>


<div class="col-lg-6 col-md-12">

<div class="card p-3 h-100">

<h5>Sentiment Analysis</h5>

<canvas id="sentimentChart"></canvas>

</div>

</div>


<div class="col-lg-6 col-md-12">

<div class="card p-3 h-100">

<h5>Top Words</h5>

<div id="topWords"></div>

</div>

</div>


<div class="col-lg-6 col-md-12">

<div class="card p-3 h-100">

<h5>Top Comments</h5>

<div id="topComments"></div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
